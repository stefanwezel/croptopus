# Loads dashboard JSON files from this directory into Grafana on startup.
apiVersion: 1

providers:
  - name: Croptopus
    orgId: 1
    folder: Croptopus
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false

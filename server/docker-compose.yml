# Croptopus server stack: TimescaleDB + ingester + Grafana.
#
# No reverse proxy / TLS here — on the VPS, Coolify (Traefik + Let's Encrypt)
# terminates TLS and routes to these services over its internal network. See
# README.md "Deploy on Coolify".
#
# Localhost-only port bindings (127.0.0.1:...) are for LOCAL dev convenience only;
# they are not how users reach the services on Coolify.

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      # Runs *.sql in here once, on first start against an empty data volume.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Keep the DB PRIVATE: only expose the port on the internal compose network,
    # never publish it to the host. (Coolify ignores a "127.0.0.1:" prefix and
    # publishes on 0.0.0.0, so host-publishing here would put Postgres on the
    # public internet.) Other services reach it via service-name DNS,
    # timescaledb:5432. For local psql access, see docker-compose.override.yml.
    expose:
      - "5432"

  ingester:
    build: ./ingester
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      # Reaches the DB by compose service-name DNS ("timescaledb").
      DATABASE_URL: ${DATABASE_URL}
      INGEST_TOKEN: ${INGEST_TOKEN}
    extra_hosts:
      # Harmless mirror of the project's pattern; only matters if someone later
      # points DATABASE_URL at a DB running on the host rather than this stack.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    # On Coolify: set a domain on THIS service so Traefik routes the BBB's POSTs
    # to container port 8000 over HTTPS. Don't host-publish 8000 — Coolify's own
    # dashboard already uses host port 8000, which is what made the deploy fail.
    expose:
      - "8000"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - timescaledb
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      # Datasource reads the same DB creds via env (see datasources/timescale.yml).
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    # On Coolify: set a domain to expose the UI via Traefik (or leave it without
    # a domain to keep it private and reach it through a tunnel). Routes to
    # container port 3000.
    expose:
      - "3000"

volumes:
  timescale_data:
  grafana_data:
